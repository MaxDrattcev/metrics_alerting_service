<!DOCTYPE html>
<html>
<head>
    <title>Metrics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
<h1>Metrics</h1>
{{if .metrics}}
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Value</th>
    </tr>
    </thead>
    <tbody>
    {{range .metrics}}
    <tr>
        <td>{{.Name}}</td>
        <td>{{.Type}}</td>
        <td>{{.Value}}</td>
    </tr>
    {{end}}
    </tbody>
</table>
{{else}}
<p>No metrics available</p>
{{end}}
</body>
</html>
